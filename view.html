<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PageCraft Pro — 접근 검증</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c10;--surface:#13131a;--surface2:#1a1a24;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --accent:#e8c97a;--accent2:#f0dfa0;
  --text:#f0ede8;--text2:#9998a8;--text3:#555568;
  --green:#3ecf8e;--red:#f87171;
  --font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;--serif:'Playfair Display',serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font)}
.titlebar{
  height:48px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;
}
.tb-logo{font-family:var(--serif);font-size:15px;letter-spacing:0.5px;color:var(--accent)}
.center-box{max-width:440px;margin:80px auto;padding:0 20px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:40px;text-align:center;
}
.card .icon{font-size:48px;margin-bottom:16px}
.card h2{font-family:var(--serif);font-size:22px;color:var(--accent);margin-bottom:8px}
.card p{color:var(--text2);font-size:13px;line-height:1.7}
.card.error{border-color:rgba(248,113,113,0.3)}
.card.error h2{color:var(--red)}
.spinner{
  width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.animate{animation:fadeIn 0.4s ease-out}
.progress{margin-top:20px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);animation:load 1.5s ease-in-out}
@keyframes load{from{width:0}to{width:100%}}
</style>
</head>
<body>

<div class="titlebar"><span class="tb-logo">PageCraft Pro</span></div>

<div id="screen" class="center-box animate">
  <div class="card">
    <div class="spinner"></div>
    <h2>접근 검증 중...</h2>
    <p>링크를 확인하고 있습니다.</p>
    <div class="progress"><div class="progress-bar"></div></div>
  </div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');

if (!token) {
  show('error', '🔗', '유효하지 않은 링크', '올바른 공유 링크를 통해 접근해주세요.');
} else {
  verify();
}

async function verify() {
  try {
    const res = await fetch('/api/links/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await res.json();

    if (!res.ok) {
      const msgs = {
        'NOT_FOUND':   ['🔗', '유효하지 않은 링크', '이 링크는 존재하지 않거나 삭제되었습니다.'],
        'INACTIVE':    ['⏸️', '비활성화된 링크', '관리자가 이 링크를 일시 중지했습니다.'],
        'EXPIRED':     ['⏰', '만료된 링크', '이 링크의 유효 기간이 지났습니다.'],
        'MAX_VISITS':  ['📊', '접근 횟수 초과', '이 링크의 최대 접근 횟수에 도달했습니다.'],
      };
      const [icon, title, desc] = msgs[data.code] || ['❌', '접근 실패', data.error];
      show('error', icon, title, desc);
      return;
    }

    // ✅ 성공 → 세션 토큰과 함께 메인 페이지로 즉시 이동
    show('ok', '✅', '인증 완료!', '페이지로 이동합니다...');
    window.location.href = '/?s=' + data.sessionToken;

  } catch (err) {
    show('error', '⚠️', '서버 오류', '잠시 후 다시 시도해주세요.');
  }
}

function show(type, icon, title, desc) {
  document.getElementById('screen').innerHTML = `
    <div class="card ${type === 'error' ? 'error' : ''} animate">
      <div class="icon">${icon}</div>
      <h2>${title}</h2>
      <p>${desc}</p>
      ${type === 'ok' ? '<div class="progress"><div class="progress-bar"></div></div>' : ''}
    </div>`;
}
</script>
</body>
</html>
