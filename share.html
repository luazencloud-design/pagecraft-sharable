<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PageCraft Pro — 공유 페이지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c10;--surface:#13131a;--surface2:#1a1a24;--surface3:#21212e;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --accent:#e8c97a;--accent2:#f0dfa0;--accent-dim:rgba(232,201,122,0.12);
  --text:#f0ede8;--text2:#9998a8;--text3:#555568;
  --green:#3ecf8e;--red:#f87171;
  --font:'Noto Sans KR',sans-serif;--mono:'DM Mono',monospace;--serif:'Playfair Display',serif;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font)}

.share-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 24px;display:flex;align-items:center;gap:12px;
}
.share-logo{font-family:var(--serif);font-size:15px;color:var(--accent);letter-spacing:0.5px}
.share-badge{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--surface2);padding:3px 10px;border-radius:4px;border:1px solid var(--border);margin-left:auto}

.share-container{max-width:720px;margin:0 auto;padding:32px 20px}

/* 상태 카드 */
.status-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:20px;margin-bottom:24px;
}
.status-row{display:flex;gap:12px;flex-wrap:wrap}
.status-item{
  flex:1;min-width:120px;background:var(--surface2);border-radius:10px;
  padding:12px 14px;border:1px solid var(--border);
}
.status-item-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.status-item-value{font-size:14px;font-weight:700;color:var(--text)}
.status-item-value.accent{color:var(--accent)}
.status-item-value.green{color:var(--green)}
.status-item-value.red{color:var(--red)}

/* 미리보기 */
.preview-card{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;
}
.preview-bar{
  height:36px;background:var(--surface2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 14px;gap:10px;
}
.preview-dots{display:flex;gap:5px}
.preview-dot{width:10px;height:10px;border-radius:50%}
.preview-dot.r{background:rgba(255,95,87,0.4)}.preview-dot.a{background:rgba(254,188,46,0.4)}.preview-dot.g{background:rgba(40,200,64,0.4)}
.preview-url{flex:1;background:var(--surface3);border-radius:5px;height:20px;display:flex;align-items:center;padding:0 10px;font-family:var(--mono);font-size:10px;color:var(--text3)}
.preview-body{padding:24px}
.preview-img{width:100%;border-radius:8px;display:block}

/* 텍스트 결과 */
.text-result{padding:24px}
.text-result .section-label{font-size:10px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
.text-result .section-value{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.5}
.text-result .section-sub{font-size:13px;color:var(--text2);margin-bottom:4px}
.text-result .divider{height:1px;background:var(--border);margin:16px 0}
.text-result .sp-item{display:flex;gap:8px;margin-bottom:8px;font-size:13px;color:#ccc}
.text-result .sp-check{color:var(--green)}
.text-result .spec-table{width:100%;border-collapse:collapse}
.text-result .spec-table td{padding:8px;font-size:12px;border-bottom:1px solid var(--border)}
.text-result .spec-table td:first-child{color:var(--text3);font-weight:600;width:100px}
.text-result .spec-table td:last-child{color:var(--text2)}
.text-result .kw-tag{display:inline-block;padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text3);margin:3px}

/* 에러/만료 */
.error-state{
  text-align:center;padding:80px 30px;
}
.error-icon{font-size:48px;margin-bottom:20px}
.error-title{font-size:20px;font-weight:700;margin-bottom:10px}
.error-desc{font-size:14px;color:var(--text2);line-height:1.7}

.footer{text-align:center;padding:24px;font-size:11px;color:var(--text3);font-family:var(--mono)}
</style>
</head>
<body>

<div class="share-header">
  <div class="share-logo">✦ PageCraft Pro</div>
  <div class="share-badge">공유 페이지</div>
</div>

<div class="share-container" id="main"></div>
<div class="footer">Powered by PageCraft Pro v2.0</div>

<script>
(function() {
  const container = document.getElementById('main');
  const token = location.hash.slice(1);

  if (!token) return showError('🔗', '잘못된 링크', '유효하지 않은 공유 링크입니다.');

  // localStorage에서 공유 데이터 검색
  const allLinks = JSON.parse(localStorage.getItem('pagecraft-links') || '[]');
  const linkData = allLinks.find(l => l.token === token);

  if (!linkData) {
    // 다른 기기에서 접속한 경우 → API에서 검색 시도
    return showError('🔍', '링크를 찾을 수 없습니다', '이 링크가 삭제되었거나, 다른 기기에서 생성된 링크일 수 있습니다.<br>같은 브라우저에서 열어주세요.');
  }

  const now = Date.now();

  // 만료 확인
  if (now > linkData.expiresAt) {
    return showError('⏱', '만료된 링크', '이 공유 링크의 유효 기간이 지났습니다.');
  }

  // 사용 횟수 확인
  if (linkData.currentUses >= linkData.maxUses) {
    return showError('👥', '사용 횟수 초과', `이 링크는 최대 ${linkData.maxUses}회까지만 열람할 수 있습니다.`);
  }

  // 사용 횟수 증가
  linkData.currentUses++;
  localStorage.setItem('pagecraft-links', JSON.stringify(allLinks));

  // 페이지 렌더링
  renderSharePage(linkData);

  function showError(icon, title, desc) {
    container.innerHTML = `
      <div class="error-state">
        <div class="error-icon">${icon}</div>
        <div class="error-title">${title}</div>
        <div class="error-desc">${desc}</div>
      </div>`;
  }

  function renderSharePage(link) {
    const d = link.resultData;
    const remaining = link.maxUses - link.currentUses;
    const expiryDate = new Date(link.expiresAt);
    const expStr = `${expiryDate.getFullYear()}.${String(expiryDate.getMonth()+1).padStart(2,'0')}.${String(expiryDate.getDate()).padStart(2,'0')} ${String(expiryDate.getHours()).padStart(2,'0')}:${String(expiryDate.getMinutes()).padStart(2,'0')}`;

    const priceNum = link.price ? parseInt(link.price.replace(/[^0-9]/g,''),10) : null;
    const priceHtml = priceNum ? `<div style="font-size:20px;font-weight:700;color:var(--accent);margin-top:8px">${priceNum.toLocaleString()}원</div>` : '';

    const specs = (d.specs||[]).map(s =>
      `<tr><td>${s.key}</td><td>${s.value}</td></tr>`
    ).join('');

    const kws = (d.keywords||[]).map(k =>
      `<span class="kw-tag">#${k}</span>`
    ).join('');

    const spItems = (d.selling_points||[]).map(p =>
      `<div class="sp-item"><span class="sp-check">✓</span>${p}</div>`
    ).join('');

    container.innerHTML = `
      <div class="status-card">
        <div class="status-row">
          <div class="status-item">
            <div class="status-item-label">잔여 열람 횟수</div>
            <div class="status-item-value ${remaining <= 2 ? 'red' : 'green'}">${remaining} / ${link.maxUses}회</div>
          </div>
          <div class="status-item">
            <div class="status-item-label">유효 기간</div>
            <div class="status-item-value accent">${link.durationLabel}</div>
          </div>
          <div class="status-item">
            <div class="status-item-label">만료 일시</div>
            <div class="status-item-value">${expStr}</div>
          </div>
        </div>
      </div>

      <div class="preview-card">
        <div class="preview-bar">
          <div class="preview-dots">
            <div class="preview-dot r"></div><div class="preview-dot a"></div><div class="preview-dot g"></div>
          </div>
          <div class="preview-url">pagecraft://shared · ${d.product_name || '상세페이지'}</div>
        </div>
        <div class="text-result">
          <div class="section-label">상품명</div>
          <div class="section-value">${d.product_name || ''}</div>
          <div class="section-sub">${d.subtitle || ''}</div>
          ${priceHtml}
          <div class="divider"></div>
          <div class="section-label">메인 카피</div>
          <div class="section-value" style="font-size:15px">${(d.main_copy||'').replace(/\n/g,'<br>')}</div>
          <div class="divider"></div>
          <div class="section-label">판매 포인트</div>
          ${spItems}
          <div class="divider"></div>
          <div class="section-label">상세 설명</div>
          <div style="font-size:13px;color:var(--text2);line-height:1.7">${(d.description||'').replace(/\n/g,'<br>')}</div>
          <div class="divider"></div>
          <div class="section-label">스펙 표</div>
          <table class="spec-table">${specs}</table>
          <div class="divider"></div>
          <div class="section-label">검색 키워드</div>
          <div>${kws}</div>
          ${d.caution ? `<div class="divider"></div><div class="section-label">주의사항</div><div style="font-size:12px;color:var(--text3);line-height:1.7">${d.caution}</div>` : ''}
        </div>
      </div>`;
  }
})();
</script>
</body>
</html>
